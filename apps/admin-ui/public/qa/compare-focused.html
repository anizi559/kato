<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design QA Focused Comparison</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #eef2f7;
        color: #101828;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 16px;
        padding: 16px;
      }

      .pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .panel {
        overflow: hidden;
        border: 1px solid #cfd8e6;
        border-radius: 8px;
        background: #ffffff;
      }

      .label {
        padding: 10px 14px;
        background: #111827;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="pair">
        <div class="panel">
          <div class="label">SOURCE TABLE FOCUS</div>
          <img src="/qa/source-table-focus.png" alt="Source table focus" />
        </div>
        <div class="panel">
          <div class="label">IMPLEMENTATION TABLE FOCUS</div>
          <img src="/qa/implementation-table-focus.png" alt="Implementation table focus" />
        </div>
      </section>
      <section class="pair">
        <div class="panel">
          <div class="label">SOURCE INSPECTOR FOCUS</div>
          <img src="/qa/source-inspector-focus.png" alt="Source inspector focus" />
        </div>
        <div class="panel">
          <div class="label">IMPLEMENTATION INSPECTOR FOCUS</div>
          <img src="/qa/implementation-inspector-focus.png" alt="Implementation inspector focus" />
        </div>
      </section>
    </main>
  </body>
</html>
