<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design QA Comparison</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #eef2f7;
        color: #101828;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .comparison {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
      }

      .panel {
        overflow: hidden;
        border: 1px solid #cfd8e6;
        border-radius: 8px;
        background: #ffffff;
      }

      .label {
        padding: 10px 14px;
        background: #111827;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="comparison">
      <section class="panel">
        <div class="label">SOURCE VISUAL TARGET</div>
        <img src="file:///Users/laijunwei/.codex/generated_images/019ec536-039e-7ba1-b79e-90fb30f84d99/ig_082382a466f9ddcc016a300c988ecc8198940e5fcf4b255e6f.png" alt="Source visual target" />
      </section>
      <section class="panel">
        <div class="label">IMPLEMENTATION SCREENSHOT</div>
        <img src="file:///Users/laijunwei/Documents/kato/apps/admin-ui/qa/admin-ui-1440x1024-v3.png" alt="Implementation screenshot" />
      </section>
    </main>
  </body>
</html>
